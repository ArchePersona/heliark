<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">HeliArk Mark</title>
  <desc id="desc">A star held inside an ark-shaped A with a sweeping crossbar and surrounding vessel arc.</desc>
  <defs>
    <radialGradient id="coreGlow" cx="50%" cy="38%" r="52%">
      <stop offset="0%" stop-color="#fff7d6"/>
      <stop offset="38%" stop-color="#f6c36a"/>
      <stop offset="74%" stop-color="#a86f21"/>
      <stop offset="100%" stop-color="#1a0e04"/>
    </radialGradient>
    <linearGradient id="goldStroke" x1="80" y1="430" x2="430" y2="80" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7a4b16"/>
      <stop offset="36%" stop-color="#f6c36a"/>
      <stop offset="62%" stop-color="#fff1bc"/>
      <stop offset="100%" stop-color="#b97a28"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="1 0 0 0 0.96  0 1 0 0 0.62  0 0 1 0 0.22  0 0 0 0.75 0" result="goldBlur"/>
      <feMerge>
        <feMergeNode in="goldBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" rx="80" fill="#04070d"/>

  <circle cx="256" cy="256" r="194" fill="none" stroke="#392510" stroke-width="18" opacity="0.9"/>
  <path d="M91 325C123 162 255 70 389 122c71 28 104 99 73 166" fill="none" stroke="url(#goldStroke)" stroke-width="22" stroke-linecap="round" opacity="0.92" filter="url(#glow)"/>

  <path d="M135 414 256 91 377 414" fill="none" stroke="url(#goldStroke)" stroke-width="34" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>

  <path d="M166 305c47-42 113-61 189-43" fill="none" stroke="url(#goldStroke)" stroke-width="28" stroke-linecap="round" filter="url(#glow)"/>

  <path d="M256 166l17 44 47 4-36 29 12 46-40-25-40 25 12-46-36-29 47-4 17-44Z" fill="url(#coreGlow)" filter="url(#glow)"/>

  <path d="M102 377c59 55 153 80 250 43" fill="none" stroke="#f6c36a" stroke-width="10" stroke-linecap="round" opacity="0.42"/>
</svg>
